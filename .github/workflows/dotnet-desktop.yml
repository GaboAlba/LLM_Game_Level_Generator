name: .NET WPF (EXE)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: windows-latest

    env:
      Solution_Name: LLM_Game_Level_Generator/LLM_Game_Level_Generator.sln
      Configuration: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore $env:Solution_Name

      - name: Build
        run: dotnet build $env:Solution_Name -c $env:Configuration --no-restore

      # Coverage + tests (still fails if tests fail; only coverage/comment won't fail)
      - name: Test with coverage
        run: >
          dotnet test $env:Solution_Name
          -c $env:Configuration
          --no-build
          /p:CollectCoverage=true
          /p:CoverletOutput=./TestResults/Coverage/
          /p:CoverletOutputFormat=cobertura

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage summary
        shell: pwsh
        continue-on-error: true
        run: |
          reportgenerator `
            "-reports:**/TestResults/Coverage/*.cobertura.xml" `
            "-targetdir:coveragereport" `
            "-reporttypes:TextSummary" `
            "-verbosity:Info"

          if (Test-Path "coveragereport\Summary.txt") {
            Get-Content "coveragereport\Summary.txt"
          } else {
            "Coverage summary not found (no coverage files produced)."
          }

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let summary = "Coverage summary not available (no Summary.txt).";
            try {
              summary = fs.readFileSync('coveragereport/Summary.txt', 'utf8');
            } catch (e) {}

            const body =
              `## Code coverage\n\n` +
              `\`\`\`\n${summary}\n\`\`\`\n` +
              `\n_(Informational only — does not fail CI.)_`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body && c.body.startsWith('## Code coverage')
            );

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }


