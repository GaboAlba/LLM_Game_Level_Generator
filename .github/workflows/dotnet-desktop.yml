name: .NET WPF (EXE)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    env:
      Solution_Name: LLM_Game_Level_Generator/LLM_Game_Level_Generator.sln
      Configuration: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore $env:Solution_Name

      - name: Build
        run: dotnet build $env:Solution_Name -c $env:Configuration --no-restore

      - name: Test
        run: dotnet test $env:Solution_Name -c $env:Configuration --no-build

